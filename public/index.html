<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokkan Character Database</title>
    
    <!-- Modern CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- React and React DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- API Client -->
    <script src="js/api.js?v=4"></script>
    
    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useCallback } = React;
        
        // Context for managing app state
        const AppContext = createContext();
        
        // Theme Context
        const ThemeContext = createContext();
        
        // Theme Provider
        function ThemeProvider({ children }) {
            const [theme, setTheme] = useState(() => {
                const saved = localStorage.getItem('dokkan-theme');
                return saved || 'light';
            });
            
            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                localStorage.setItem('dokkan-theme', newTheme);
            };
            
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);
            
            return React.createElement(ThemeContext.Provider, 
                { value: { theme, toggleTheme } }, 
                children
            );
        }
        
        // Custom hook to use theme
        function useTheme() {
            const context = useContext(ThemeContext);
            if (!context) {
                throw new Error('useTheme must be used within ThemeProvider');
            }
            return context;
        }
        
        // Character comparison hook
        function useComparison() {
            const [compareList, setCompareList] = useState([]);
            const [showComparison, setShowComparison] = useState(false);
            
            const addToCompare = (character) => {
                if (compareList.length < 3 && !compareList.some(c => c.id === character.id)) {
                    setCompareList(prev => [...prev, character]);
                }
            };
            
            const removeFromCompare = (characterId) => {
                setCompareList(prev => prev.filter(c => c.id !== characterId));
            };
            
            const clearCompare = () => {
                setCompareList([]);
                setShowComparison(false);
            };
            
            return {
                compareList,
                showComparison,
                setShowComparison,
                addToCompare,
                removeFromCompare,
                clearCompare
            };
        }
        
        // Team Builder hook
        function useTeamBuilder() {
            const [team, setTeam] = useState([]);
            const [linkingPartners, setLinkingPartners] = useState({});
            const [allCharacters, setAllCharacters] = useState([]);
            
            const addToTeam = (character) => {
                if (team.length < 6 && !team.some(c => c.id === character.id)) {
                    setTeam(prev => [...prev, character]);
                }
            };
            
            const removeFromTeam = (characterId) => {
                setTeam(prev => prev.filter(c => c.id !== characterId));
            };
            
            const clearTeam = () => {
                setTeam([]);
                setLinkingPartners({});
            };
            
            // Find perfect linking partners for a character
            const findLinkingPartners = async (character) => {
                if (!character.links || !Array.isArray(character.links)) return [];
                
                try {
                    const response = await fetch(`/api/characters/linking-partners/${character.id}`);
                    const data = await response.json();
                    if (data.success) {
                        return data.data;
                    }
                } catch (error) {
                    console.error('Failed to fetch linking partners:', error);
                }
                
                // Fallback: calculate locally if API fails
                return allCharacters.filter(partner => {
                    if (partner.id === character.id) return false;
                    if (!partner.links || !Array.isArray(partner.links)) return false;
                    
                    const sharedLinks = character.links.filter(link => 
                        partner.links.includes(link)
                    );
                    
                    return sharedLinks.length >= 4; // Perfect linking (4+ shared links)
                });
            };
            
            const updateLinkingPartners = async (character) => {
                const partners = await findLinkingPartners(character);
                setLinkingPartners(prev => ({
                    ...prev,
                    [character.id]: partners
                }));
            };
            
            return {
                team,
                linkingPartners,
                allCharacters,
                setAllCharacters,
                addToTeam,
                removeFromTeam,
                clearTeam,
                findLinkingPartners,
                updateLinkingPartners
            };
        }
        
        // App State Provider
        function AppProvider({ children }) {
            const [characters, setCharacters] = useState([]);
            const [filters, setFilters] = useState({});
            const [currentFilters, setCurrentFilters] = useState({});
            const [stats, setStats] = useState({});
            const [loading, setLoading] = useState(false);
            const [pagination, setPagination] = useState({});
            const [selectedCharacter, setSelectedCharacter] = useState(null);
            const [currentView, setCurrentView] = useState('grid'); // 'grid', 'stats', 'compare', 'team'
            const comparison = useComparison();
            const teamBuilder = useTeamBuilder();
            
            const searchCharacters = useCallback(async (reset = false, page = 1) => {
                if (loading) return;
                
                try {
                    setLoading(true);
                    
                    const params = new URLSearchParams({
                        page,
                        limit: 20,
                        ...currentFilters
                    });
                    
                    const response = await fetch(`/api/characters?${params}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        if (reset) {
                            setCharacters(data.data.characters);
                            setFilters(data.data.filters);
                        } else {
                            setCharacters(prev => [...prev, ...data.data.characters]);
                        }
                        setPagination(data.data.pagination);
                    }
                } catch (error) {
                    console.error('Search failed:', error);
                } finally {
                    setLoading(false);
                }
            }, [currentFilters, loading]);
            
            const loadStats = useCallback(async () => {
                try {
                    const response = await fetch('/api/characters/stats/summary');
                    const data = await response.json();
                    if (data.success) {
                        setStats(data.data);
                    }
                } catch (error) {
                    console.error('Failed to load stats:', error);
                }
            }, []);
            
            useEffect(() => {
                loadStats();
                searchCharacters(true);
            }, []);
            
            useEffect(() => {
                // Load all characters for team builder
                if (characters.length > 0) {
                    teamBuilder.setAllCharacters(characters);
                }
            }, [characters]);
            
            useEffect(() => {
                searchCharacters(true);
            }, [currentFilters]);
            
            const value = {
                characters,
                filters,
                currentFilters,
                setCurrentFilters,
                stats,
                loading,
                pagination,
                selectedCharacter,
                setSelectedCharacter,
                searchCharacters,
                loadStats,
                currentView,
                setCurrentView,
                ...comparison,
                ...teamBuilder
            };
            
            return React.createElement(AppContext.Provider, { value }, children);
        }
        
        // Custom hook to use app context
        function useApp() {
            const context = useContext(AppContext);
            if (!context) {
                throw new Error('useApp must be used within AppProvider');
            }
            return context;
        }
        
        // Stats Component
        function StatsBar() {
            const { stats } = useApp();
            
            return (
                <div className="stats-container">
                    <div className="stat-card">
                        <div className="stat-value">{stats.totalCharacters || 0}</div>
                        <div className="stat-label">Characters</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-value">{stats.totalCategories || 0}</div>
                        <div className="stat-label">Categories</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-value">{stats.lastUpdate ? 'Today' : 'Never'}</div>
                        <div className="stat-label">Last Update</div>
                    </div>
                </div>
            );
        }
        
        // Search and Filter Component
        function SearchFilters() {
            const { filters, currentFilters, setCurrentFilters } = useApp();
            const [searchTimeout, setSearchTimeout] = useState(null);
            
            const handleSearch = (value) => {
                if (searchTimeout) clearTimeout(searchTimeout);
                const timeout = setTimeout(() => {
                    setCurrentFilters(prev => ({ ...prev, search: value }));
                }, 300);
                setSearchTimeout(timeout);
            };
            
            const handleRarityFilter = (rarity) => {
                setCurrentFilters(prev => ({ ...prev, rarity }));
            };
            
            const handleFilterChange = (key, value) => {
                setCurrentFilters(prev => ({ ...prev, [key]: value }));
            };
            
            return (
                <div className="search-filters">
                    <div className="search-bar">
                        <i className="fas fa-search"></i>
                        <input 
                            type="text" 
                            placeholder="Search characters..."
                            onChange={(e) => handleSearch(e.target.value)}
                        />
                    </div>
                    
                    <div className="rarity-filters">
                        {['', 'LR', 'UR', 'SSR', 'SR', 'R', 'N'].map(rarity => (
                            <button 
                                key={rarity || 'all'}
                                className={`rarity-btn ${currentFilters.rarity === rarity ? 'active' : ''}`}
                                onClick={() => handleRarityFilter(rarity)}
                            >
                                {rarity || 'All'}
                            </button>
                        ))}
                    </div>
                    
                    <div className="filter-selects">
                        <select onChange={(e) => handleFilterChange('type', e.target.value)}>
                            <option value="">All Types</option>
                            {(filters.types || []).map(type => (
                                <option key={type} value={type}>{type}</option>
                            ))}
                        </select>
                        
                        <select onChange={(e) => handleFilterChange('class', e.target.value)}>
                            <option value="">All Classes</option>
                            {(filters.classes || []).map(cls => (
                                <option key={cls} value={cls}>{cls}</option>
                            ))}
                        </select>
                        
                        <select onChange={(e) => handleFilterChange('category', e.target.value)}>
                            <option value="">All Categories</option>
                            {(filters.categories || []).slice(0, 50).map(category => (
                                <option key={category} value={category}>{category}</option>
                            ))}
                        </select>
                    </div>
                </div>
            );
        }
        
        // Character Card Component
        function CharacterCard({ character, showActions = true }) {
            const { setSelectedCharacter, addToCompare, compareList, addToTeam, team, currentView } = useApp();
            
            const imageUrl = character.image_url && character.image_url !== 'Error' ? character.image_url : null;
            const isInCompare = compareList.some(c => c.id === character.id);
            const isInTeam = team.some(c => c.id === character.id);
            
            const handleCompareClick = (e) => {
                e.stopPropagation();
                addToCompare(character);
            };
            
            const handleTeamClick = (e) => {
                e.stopPropagation();
                addToTeam(character);
            };
            
            return (
                <div className="character-card" onClick={() => setSelectedCharacter(character)}>
                    <div className="character-image">
                        {imageUrl ? (
                            <img src={imageUrl} alt={character.name} loading="lazy" />
                        ) : (
                            <div className="no-image">
                                <i className="fas fa-user"></i>
                            </div>
                        )}
                        <div className={`rarity-badge rarity-${character.rarity}`}>
                            {character.rarity}
                        </div>
                    </div>
                    
                    <div className="character-info">
                        <h3 className="character-name">{character.name}</h3>
                        <p className="character-title">{character.title}</p>
                        
                        <div className="character-meta">
                            <span className={`badge type-${character.type}`}>{character.type}</span>
                            <span className={`badge class-${character.class}`}>{character.class}</span>
                            <span className="badge cost">Cost: {character.cost}</span>
                        </div>
                        
                        {showActions && (
                            <div className="character-actions">
                                <button 
                                    className={`compare-btn ${isInCompare ? 'active' : ''}`}
                                    onClick={handleCompareClick}
                                    disabled={compareList.length >= 3 && !isInCompare}
                                    title="Add to comparison"
                                >
                                    <i className="fas fa-balance-scale"></i>
                                </button>
                                <button 
                                    className={`team-btn ${isInTeam ? 'active' : ''}`}
                                    onClick={handleTeamClick}
                                    disabled={team.length >= 6 && !isInTeam}
                                    title="Add to team"
                                >
                                    <i className="fas fa-users"></i>
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        // Character Grid Component
        function CharacterGrid() {
            const { characters, loading, pagination, searchCharacters } = useApp();
            
            const loadMore = () => {
                if (pagination.hasNext && !loading) {
                    searchCharacters(false, pagination.page + 1);
                }
            };
            
            return (
                <div className="character-section">
                    <div className="results-info">
                        <span>{pagination.total || 0} characters found</span>
                        {loading && <i className="fas fa-spinner fa-spin"></i>}
                    </div>
                    
                    <div className="character-grid">
                        {characters.map(character => (
                            <CharacterCard key={character.id} character={character} />
                        ))}
                    </div>
                    
                    {pagination.hasNext && (
                        <div className="load-more">
                            <button onClick={loadMore} disabled={loading}>
                                {loading ? 'Loading...' : 'Load More'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }
        
        // Character Modal Component
        function CharacterModal() {
            const { selectedCharacter, setSelectedCharacter } = useApp();
            const [awakening, setAwakening] = React.useState('base'); // 'base', 'eza', 'seza'
            
            if (!selectedCharacter) return null;
            
            const closeModal = () => {
                setSelectedCharacter(null);
                setAwakening('base');
            };
            
            // Check if character has EZA/SEZA data
            const hasEza = selectedCharacter.eza_leader_skill || selectedCharacter.eza_super_attack || selectedCharacter.eza_passive;
            const hasSeza = selectedCharacter.seza_leader_skill || selectedCharacter.seza_super_attack || selectedCharacter.seza_passive;
            
            // Get current skill data based on awakening state
            const getCurrentSkill = (base, eza, seza) => {
                if (awakening === 'seza' && seza && seza !== 'Error') return seza;
                if (awakening === 'eza' && eza && eza !== 'Error') return eza;
                return base;
            };
            
            // Use the full image URL from database, fallback to converted thumbnail URL
            const fullSizeImageUrl = selectedCharacter.full_image_url || 
                (selectedCharacter.image_url && selectedCharacter.image_url !== 'Error' ? 
                selectedCharacter.image_url.replace('thumb_apng.png', 'apng.png') : null);
            
            return (
                <div className="modal-overlay" onClick={closeModal}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        {fullSizeImageUrl && (
                            <div 
                                className="modal-backdrop" 
                                style={{backgroundImage: `url(${fullSizeImageUrl})`}}
                            ></div>
                        )}
                        <div className="modal-header">
                            <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                                <h2>{selectedCharacter.name}</h2>
                                {(hasEza || hasSeza) && (
                                    <div style={{display: 'flex', gap: '0.5rem'}}>
                                        <button 
                                            onClick={() => setAwakening('base')}
                                            style={{
                                                padding: '0.25rem 0.75rem',
                                                borderRadius: '15px',
                                                border: 'none',
                                                background: awakening === 'base' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)',
                                                color: awakening === 'base' ? '#667eea' : 'white',
                                                fontWeight: '600',
                                                fontSize: '0.8rem',
                                                cursor: 'pointer'
                                            }}
                                        >
                                            Base
                                        </button>
                                        {hasEza && (
                                            <button 
                                                onClick={() => setAwakening('eza')}
                                                style={{
                                                    padding: '0.25rem 0.75rem',
                                                    borderRadius: '15px',
                                                    border: 'none',
                                                    background: awakening === 'eza' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)',
                                                    color: awakening === 'eza' ? '#667eea' : 'white',
                                                    fontWeight: '600',
                                                    fontSize: '0.8rem',
                                                    cursor: 'pointer'
                                                }}
                                            >
                                                EZA
                                            </button>
                                        )}
                                        {hasSeza && (
                                            <button 
                                                onClick={() => setAwakening('seza')}
                                                style={{
                                                    padding: '0.25rem 0.75rem',
                                                    borderRadius: '15px',
                                                    border: 'none',
                                                    background: awakening === 'seza' ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)',
                                                    color: awakening === 'seza' ? '#667eea' : 'white',
                                                    fontWeight: '600',
                                                    fontSize: '0.8rem',
                                                    cursor: 'pointer'
                                                }}
                                            >
                                                SEZA
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                            <button className="close-btn" onClick={closeModal}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        
                        <div className="modal-body">
                            <div className="character-details">
                                {selectedCharacter.image_url && selectedCharacter.image_url !== 'Error' && (
                                    <img src={selectedCharacter.image_url} alt={selectedCharacter.name} />
                                )}
                                
                                <div className="details-grid">
                                    <div className="detail-item">
                                        <label>Title:</label>
                                        <span>{selectedCharacter.title}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Rarity:</label>
                                        <span>{selectedCharacter.rarity}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Type:</label>
                                        <span>{selectedCharacter.type}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Class:</label>
                                        <span>{selectedCharacter.class}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Cost:</label>
                                        <span>{selectedCharacter.cost}</span>
                                    </div>
                                    <div className="detail-item">
                                        <label>Max Level:</label>
                                        <span>{selectedCharacter.max_level}</span>
                                    </div>
                                </div>
                                
                                {/* Stats Section */}
                                <div className="skill-section">
                                    <h4>Stats {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                    <div className="stats-grid-modal">
                                        <div className="stat-box stat-box-hp">
                                            <h5>❤️ HP</h5>
                                            <div className="stat-box-content">
                                                <div>Base: {selectedCharacter.base_hp?.toLocaleString() || 'N/A'}</div>
                                                <div>Max Lv: {selectedCharacter.max_level_hp?.toLocaleString() || 'N/A'}</div>
                                                <div>Free Dupe: {selectedCharacter.free_dupe_hp?.toLocaleString() || 'N/A'}</div>
                                                <div className="rainbow-stat">Rainbow: {selectedCharacter.rainbow_hp?.toLocaleString() || 'N/A'}</div>
                                            </div>
                                        </div>
                                        
                                        <div className="stat-box stat-box-atk">
                                            <h5>⚔️ ATK</h5>
                                            <div className="stat-box-content">
                                                <div>Base: {selectedCharacter.base_attack?.toLocaleString() || 'N/A'}</div>
                                                <div>Max Lv: {selectedCharacter.max_level_attack?.toLocaleString() || 'N/A'}</div>
                                                <div>Free Dupe: {selectedCharacter.free_dupe_attack?.toLocaleString() || 'N/A'}</div>
                                                <div className="rainbow-stat">Rainbow: {selectedCharacter.rainbow_attack?.toLocaleString() || 'N/A'}</div>
                                            </div>
                                        </div>
                                        
                                        <div className="stat-box stat-box-def">
                                            <h5>🛡️ DEF</h5>
                                            <div className="stat-box-content">
                                                <div>Base: {selectedCharacter.base_defence?.toLocaleString() || 'N/A'}</div>
                                                <div>Max Lv: {selectedCharacter.max_defence?.toLocaleString() || 'N/A'}</div>
                                                <div>Free Dupe: {selectedCharacter.free_dupe_defence?.toLocaleString() || 'N/A'}</div>
                                                <div className="rainbow-stat">Rainbow: {selectedCharacter.rainbow_defence?.toLocaleString() || 'N/A'}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                {(() => {
                                    const leaderSkill = getCurrentSkill(
                                        selectedCharacter.leader_skill,
                                        selectedCharacter.eza_leader_skill,
                                        selectedCharacter.seza_leader_skill
                                    );
                                    return leaderSkill && leaderSkill !== 'Error' && (
                                        <div className="skill-section">
                                            <h4>Leader Skill {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                            <p>{leaderSkill}</p>
                                        </div>
                                    );
                                })()}
                                
                                {(() => {
                                    const superAttack = getCurrentSkill(
                                        selectedCharacter.super_attack,
                                        selectedCharacter.eza_super_attack,
                                        selectedCharacter.seza_super_attack
                                    );
                                    return superAttack && superAttack !== 'Error' && (
                                        <div className="skill-section">
                                            <h4>Super Attack {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                            <p>{superAttack}</p>
                                        </div>
                                    );
                                })()}
                                
                                {(() => {
                                    const ultraSuperAttack = getCurrentSkill(
                                        selectedCharacter.ultra_super_attack,
                                        selectedCharacter.eza_ultra_super_attack,
                                        selectedCharacter.seza_ultra_super_attack
                                    );
                                    return ultraSuperAttack && ultraSuperAttack !== 'Error' && (
                                        <div className="skill-section">
                                            <h4>Ultra Super Attack {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                            <p>{ultraSuperAttack}</p>
                                        </div>
                                    );
                                })()}
                                
                                {(() => {
                                    const passive = getCurrentSkill(
                                        selectedCharacter.passive,
                                        selectedCharacter.eza_passive,
                                        selectedCharacter.seza_passive
                                    );
                                    return passive && passive !== 'Error' && (
                                        <div className="skill-section">
                                            <h4>Passive Skill {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                            <p>{passive}</p>
                                        </div>
                                    );
                                })()}
                                
                                {(() => {
                                    const activeSkill = getCurrentSkill(
                                        selectedCharacter.active_skill,
                                        selectedCharacter.eza_active_skill,
                                        selectedCharacter.seza_active_skill
                                    );
                                    return activeSkill && activeSkill !== 'Error' && (
                                        <div className="skill-section">
                                            <h4>Active Skill {awakening !== 'base' && `(${awakening.toUpperCase()})`}</h4>
                                            <p>{activeSkill}</p>
                                        </div>
                                    );
                                })()}
                                
                                {/* Standby Skills */}
                                {selectedCharacter.standby_skill && selectedCharacter.standby_skill !== 'Error' && (
                                    <div className="skill-section">
                                        <h4>🔄 Standby Skill</h4>
                                        <p>{selectedCharacter.standby_skill}</p>
                                        {selectedCharacter.standby_skill_condition && selectedCharacter.standby_skill_condition !== 'Error' && (
                                            <div style={{marginTop: '0.5rem', padding: '0.5rem', background: '#e8f4f8', borderRadius: '6px', fontSize: '0.9rem'}}>
                                                <strong>Condition:</strong> {selectedCharacter.standby_skill_condition}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {/* Transformation Section */}
                                {selectedCharacter.transformation && selectedCharacter.transformation.length > 0 && (
                                    <div className="skill-section">
                                        <h4>🔄 Transformations</h4>
                                        <div className="transformation-list">
                                            {selectedCharacter.transformation.map((transform, index) => (
                                                <div key={index} className="transformation-item">
                                                    <h5>Transform {index + 1}: {transform.name}</h5>
                                                    <div className="transformation-details">
                                                        {transform.condition && <p><strong>Condition:</strong> {transform.condition}</p>}
                                                        {transform.passive && <p><strong>Passive:</strong> {transform.passive}</p>}
                                                        {transform.super_attack && <p><strong>Super Attack:</strong> {transform.super_attack}</p>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                const totalDefence = team.reduce((sum, char) => sum + (char.rainbow_defence || 0), 0);
                const totalCost = team.reduce((sum, char) => sum + (char.cost || 0), 0);
                
                // Calculate type synergy
                const typeCount = team.reduce((acc, char) => {
                    acc[char.type] = (acc[char.type] || 0) + 1;
                    return acc;
                }, {});
                
                // Calculate class synergy

        // Data Export Functions
        function exportComparison(characters) {
            const data = {
                timestamp: new Date().toISOString(),
                characters: characters.map(char => ({
                    name: char.name,
                    title: char.title,
                    rarity: char.rarity,
                    type: char.type,
                    class: char.class,
                    stats: {
                        hp: char.rainbow_hp,
                        attack: char.rainbow_attack,
                        defence: char.rainbow_defence
                    },
                    skills: {
                        leader: char.leader_skill,
                        passive: char.passive,
                        super_attack: char.super_attack
                    }
                }))
            };
            
            downloadJSON(data, `dokkan_comparison_${new Date().toISOString().split('T')[0]}.json`);
        }
        
        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

                            </button>
                            <button 
                                className={`nav-btn ${currentView === 'stats' ? 'active' : ''}`}
                                onClick={() => setCurrentView('stats')}
                            >
                                <i className="fas fa-chart-bar"></i> Statistics
                            </button>
                        </div>
                        
                        <div className="header-actions">
                            <button 
                                className="theme-toggle-btn" 
                                onClick={toggleTheme}
                                title={`Switch to ${theme === 'light' ? 'dark' : 'light'} mode`}
                            >
                                <i className={`fas fa-${theme === 'light' ? 'moon' : 'sun'}`}></i>
                            </button>
                            <button className="export-btn" onClick={exportAllData}>
                                <i className="fas fa-download"></i> Export
                            </button>
                            <button className="update-btn" onClick={triggerUpdate}>
                                <i className="fas fa-sync-alt"></i> Update
                            </button>
                        </div>
                    </div>
                </header>
            );
        }
        
        // Main App Component
        function App() {
            return (
                <ThemeProvider>
                    <AppProvider>
                        <div className="app">
                            <Header />
                            <main className="main-content">
                                <MainContent />
                            </main>
                            <CharacterModal />
                        </div>
                    </AppProvider>
                </ThemeProvider>
            );
        }
        
        // Main Content Router
        function MainContent() {
            const { currentView } = useApp();
            
            switch (currentView) {
                case 'team':
                    return <TeamBuilder />;
                case 'compare':
                    return <ComparisonTool />;
                case 'stats':
                    return <StatsDashboard />;
                default:
                    return (
                        <>
                            <StatsBar />
                            <SearchFilters />
                            <CharacterGrid />
                        </>
                    );
            }
        }
        
        // Render the app
        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
