<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokkan Character Database</title>
    
    <!-- Modern CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- React and React DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>
    
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    
    <!-- API Client -->
    <script src="js/api.js?v=5"></script>
    
    <!-- Component Scripts -->
    <script src="js/components/Utils.js" type="text/babel"></script>
    <script src="js/components/AppContext.js" type="text/babel"></script>
    <script src="js/components/Header.js" type="text/babel"></script>
    <script src="js/components/SearchAndFilters.js" type="text/babel"></script>
    <script src="js/components/CharacterCard.js" type="text/babel"></script>
    <script src="js/components/CharacterGrid.js" type="text/babel"></script>
    <script src="js/components/CharacterModal.js" type="text/babel"></script>
    <script src="js/components/Dashboard.js" type="text/babel"></script>
    <script src="js/components/Analytics.js" type="text/babel"></script>
    <script src="js/components/ScraperControl.js" type="text/babel"></script>
    
    <!-- Main App -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Main App Component
        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const { isConnected, setIsConnected, setScrapingProgress, setIsScrapingActive } = useAppContext();
            
            // Socket setup
            useEffect(() => {
                const socket = io();
                
                socket.on('connect', () => {
                    console.log('Connected to server');
                    setIsConnected(true);
                });
                
                socket.on('disconnect', () => {
                    console.log('Disconnected from server');
                    setIsConnected(false);
                });
                
                socket.on('scraping-progress', (progress) => {
                    setScrapingProgress(progress);
                    setIsScrapingActive(progress.isActive);
                });
                
                socket.on('scraping-complete', (data) => {
                    setScrapingProgress(null);
                    setIsScrapingActive(false);
                    console.log('Scraping completed:', data);
                });
                
                socket.on('scraping-error', (error) => {
                    setScrapingProgress(null);
                    setIsScrapingActive(false);
                    console.error('Scraping error:', error);
                });
                
                return () => socket.disconnect();
            }, [setIsConnected, setScrapingProgress, setIsScrapingActive]);
            
            // Render current view
            const renderCurrentView = () => {
                switch (currentView) {
                    case 'analytics':
                        return React.createElement(Analytics);
                    case 'scraper':
                        return React.createElement(ScraperControl);
                    default:
                        return React.createElement(Dashboard);
                }
            };
            
            return React.createElement('div', { className: 'app' },
                React.createElement(Header),
                React.createElement('nav', { className: 'main-nav' },
                    React.createElement('button', {
                        className: `nav-btn ${currentView === 'dashboard' ? 'active' : ''}`,
                        onClick: () => setCurrentView('dashboard')
                    }, 
                        React.createElement('i', { className: 'fas fa-home' }),
                        'Dashboard'
                    ),
                    React.createElement('button', {
                        className: `nav-btn ${currentView === 'analytics' ? 'active' : ''}`,
                        onClick: () => setCurrentView('analytics')
                    },
                        React.createElement('i', { className: 'fas fa-chart-bar' }),
                        'Analytics'
                    ),
                    React.createElement('button', {
                        className: `nav-btn ${currentView === 'scraper' ? 'active' : ''}`,
                        onClick: () => setCurrentView('scraper')
                    },
                        React.createElement('i', { className: 'fas fa-cog' }),
                        'Scraper'
                    )
                ),
                React.createElement('main', { className: 'main-content' },
                    renderCurrentView()
                )
            );
        }
        
        // Root App with Providers
        function RootApp() {
            return React.createElement(ThemeProvider, null,
                React.createElement(AppStateProvider, null,
                    React.createElement(App)
                )
            );
        }
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(RootApp));
    </script>
</body>
</html>
